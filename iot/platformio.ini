; platformio.ini
; PlatformIO Project Configuration File for the SAKA ESP32 Stethoscope

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; BLE + WiFi + WebSockets nearly fill the default 1.3 MB app partition.
; huge_app gives a single ~3 MB app partition (no OTA) with plenty of headroom.
board_build.partitions = huge_app.csv

; Libraries actually used by the firmware. BLE (BLEDevice/BLE2902) and I2S
; (driver/i2s.h) are part of the ESP32 Arduino framework and need no lib_deps.
lib_deps =
    ; WebSocket server for real-time audio streaming
    links2004/WebSockets@^2.4.1
    ; JSON for command/status serialization
    bblanchon/ArduinoJson@^6.21.5

; Build flags
build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D USE_WEBSOCKET
    -D USE_BLE

; Upload/monitor ports are auto-detected. If you have multiple serial devices,
; set them explicitly, e.g.:
;   upload_port = /dev/cu.usbserial-0001   (macOS)
;   upload_port = COM5                     (Windows)
; monitor_port = ${this.upload_port}
